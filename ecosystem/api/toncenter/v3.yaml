openapi: 3.0.0
info:
  title: TON Index (Go)
  description: TON Index collects data from a full node to PostgreSQL database and provides convenient API to an indexed blockchain.
  version: '1.2.4-rc'
  contact: {}
servers:
- url: 'https://toncenter.com'
- url: 'https://testnet.toncenter.com'
paths:
  /api/v3/accountStates:
    get:
      security: []
      description: 'Returns the current on-chain state for one or more accounts. Includes balance, contract code and data
        hashes, account status, and last transaction reference. Use `include_boc` to control whether full code and data BOCs
        are returned.'
      tags:
      - Accounts
      summary: Get account states
      operationId: api_v3_get_account_states
      parameters:
      - name: address
        in: query
        description: List of addresses in any form. Maximum 1000 addresses allowed.
        required: true
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: include_boc
        in: query
        description: 'Include code and data BOCs. Default: true'
        schema:
          type: boolean
          default: true
      responses:
        '200':
          description: Current state for each requested account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountStatesResponse'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
  /api/v3/actions:
    get:
      security: []
      description: 'Returns parsed high-level actions (transfers, swaps, burns, etc.) derived from on-chain traces. Filter
        by account, transaction hash, message hash, trace ID, or action type. Actions provide a human-readable interpretation
        of raw transactions.'
      tags:
      - Actions and traces
      summary: Get actions
      operationId: api_v3_get_actions
      parameters:
      - name: account
        in: query
        description: 'List of account addresses to get actions. Can be sent in hex, base64 or base64url form.'
        schema:
          type: string
      - name: tx_hash
        in: query
        description: Find actions by transaction hash.
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: msg_hash
        in: query
        description: Find actions by message hash.
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: action_id
        in: query
        description: Find actions by the action_id.
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: trace_id
        in: query
        description: Find actions by the trace_id.
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: mc_seqno
        in: query
        description: Query actions of traces which was completed in masterchain block with given seqno
        schema:
          type: integer
          format: int32
      - name: start_utime
        in: query
        description: 'Query actions for traces with `trace_end_utime >= start_utime`.'
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: end_utime
        in: query
        description: 'Query actions for traces with `trace_end_utime <= end_utime`.'
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: start_lt
        in: query
        description: 'Query actions for traces with `trace_end_lt >= start_lt`.'
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: end_lt
        in: query
        description: 'Query actions for traces with `trace_end_lt <= end_lt`.'
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: action_type
        in: query
        description: Include action types.
        explode: true
        schema:
          type: array
          items:
            enum:
            - call_contract
            - contract_deploy
            - ton_transfer
            - auction_bid
            - change_dns
            - dex_deposit_liquidity
            - dex_withdraw_liquidity
            - delete_dns
            - renew_dns
            - election_deposit
            - election_recover
            - jetton_burn
            - jetton_swap
            - jetton_transfer
            - jetton_mint
            - nft_mint
            - tick_tock
            - stake_deposit
            - stake_withdrawal
            - stake_withdrawal_request
            - subscribe
            - unsubscribe
            type: string
      - name: exclude_action_type
        in: query
        description: Exclude action types.
        explode: true
        schema:
          type: array
          items:
            enum:
            - call_contract
            - contract_deploy
            - ton_transfer
            - auction_bid
            - change_dns
            - dex_deposit_liquidity
            - dex_withdraw_liquidity
            - delete_dns
            - renew_dns
            - election_deposit
            - election_recover
            - jetton_burn
            - jetton_swap
            - jetton_transfer
            - jetton_mint
            - nft_mint
            - tick_tock
            - stake_deposit
            - stake_withdrawal
            - stake_withdrawal_request
            - subscribe
            - unsubscribe
            type: string
      - name: supported_action_types
        in: query
        description: Supported action types
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: include_accounts
        in: query
        description: Include accounts array for each action in response.
        schema:
          type: boolean
          default: false
      - name: include_transactions
        in: query
        description: 'Include `transactions_full` array with detailed transaction data for each action in response.'
        schema:
          type: boolean
          default: false
      - name: limit
        in: query
        description: 'Limit number of queried rows. Use with *offset* to batch read.'
        schema:
          type: integer
          format: int32
          default: 10
          minimum: 1
          maximum: 1000
      - name: offset
        in: query
        description: 'Skip first N rows. Use with *limit* to batch read.'
        schema:
          type: integer
          format: int32
          default: 0
          minimum: 0
      - name: sort
        in: query
        description: Sort actions by lt.
        schema:
          type: string
          default: desc
          enum:
          - asc
          - desc
      responses:
        '200':
          description: Matching actions with optional address book and metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionsResponse'
  /api/v3/addressBook:
    get:
      security: []
      description: 'Returns the address book entries for a list of addresses. Each entry includes the user-friendly address
        form, detected interfaces, and associated DNS domain (if any).'
      tags:
      - Accounts
      summary: Get address book
      operationId: api_v3_get_address_book
      parameters:
      - name: address
        in: query
        description: 'List of addresses in any form to get address book. Max: 1024.'
        required: true
        explode: true
        schema:
          type: array
          items:
            type: string
      responses:
        '200':
          description: Address book entries keyed by raw address.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressBook'
        '422':
          $ref: '#/components/responses/422'
  /api/v3/addressInformation:
    get:
      security: []
      description: 'Returns the current state of an account on the TON blockchain. Includes balance (in nanotons), smart contract
        code and data (as BOC-encoded strings), account status, and a reference to the last transaction. Compatible with the
        v2 API response format.'
      tags:
      - Api/v2
      summary: Get address information
      operationId: api_v3_get_v2_addressInformation
      parameters:
      - name: address
        in: query
        description: Account address in any form.
        required: true
        schema:
          type: string
      - name: use_v2
        in: query
        description: Use method from api/v2. Not recommended
        schema:
          type: boolean
          default: true
      responses:
        '200':
          description: 'Current account state in v2-compatible format.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2AddressInformation'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
  /api/v3/adjacentTransactions:
    get:
      security: []
      description: 'Returns the parent and/or child transactions for a given transaction. Use `direction` to filter by inbound
        or outbound messages. Useful for tracing the execution flow of a multi-hop message chain.'
      tags:
      - Blockchain Data
      summary: Get adjacent transactions
      operationId: api_v3_get_adjacent_transactions
      parameters:
      - name: hash
        in: query
        description: Transaction hash.
        schema:
          type: string
      - name: direction
        in: query
        description: Direction of message.
        schema:
          type: string
          enum:
          - in
          - out
      responses:
        '200':
          description: Parent and/or child transactions for the specified transaction.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionsResponse'
  /api/v3/blocks:
    get:
      security: []
      description: 'Returns blocks matching the specified filters. Query by workchain, shard, sequence number, root hash,
        file hash, or time range. Each block includes metadata such as transaction count, validator info, and references to
        previous blocks.'
      tags:
      - Blockchain Data
      summary: Get blocks
      operationId: api_v3_get_blocks
      parameters:
      - name: workchain
        in: query
        description: Block workchain.
        schema:
          type: integer
          format: int32
      - name: shard
        in: query
        description: 'Block shard id. Must be sent with *workchain*. Example: `8000000000000000`.'
        schema:
          type: string
      - name: seqno
        in: query
        description: 'Block block seqno. Must be sent with *workchain* and *shard*.'
        schema:
          type: integer
          format: int32
      - name: root_hash
        in: query
        description: Block root hash.
        schema:
          type: string
      - name: file_hash
        in: query
        description: Block file hash.
        schema:
          type: string
      - name: mc_seqno
        in: query
        description: Masterchain block seqno
        schema:
          type: integer
          format: int32
      - name: start_utime
        in: query
        description: 'Query blocks with generation UTC timestamp **after** given timestamp.'
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: end_utime
        in: query
        description: 'Query blocks with generation UTC timestamp **before** given timestamp.'
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: start_lt
        in: query
        description: 'Query blocks with `lt >= start_lt`.'
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: end_lt
        in: query
        description: 'Query blocks with `lt <= end_lt`.'
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: limit
        in: query
        description: 'Limit number of queried rows. Use with *offset* to batch read.'
        schema:
          type: integer
          format: int32
          default: 10
          minimum: 1
          maximum: 1000
      - name: offset
        in: query
        description: 'Skip first N rows. Use with *limit* to batch read.'
        schema:
          type: integer
          format: int32
          default: 0
          minimum: 0
      - name: sort
        in: query
        description: Sort results by UTC timestamp.
        schema:
          type: string
          default: desc
          enum:
          - asc
          - desc
      responses:
        '200':
          description: Matching blocks with full metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlocksResponse'
  /api/v3/decode:
    get:
      security: []
      description: 'Decodes opcodes and message bodies into human-readable form. Opcodes can be in hex (with or without `0x`
        prefix) or decimal format. Bodies should be in base64 or hex format. Maximum 1000 items per list.'
      tags:
      - Utils
      summary: Decode opcodes and bodies
      operationId: api_v3_get_decode
      parameters:
      - name: opcodes
        in: query
        description: List of opcodes to decode (hex or decimal)
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: bodies
        in: query
        description: List of message bodies to decode (base64 or hex)
        explode: true
        schema:
          type: array
          items:
            type: string
      responses:
        '200':
          description: Decoded opcodes and message bodies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecodeResponse'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
    post:
      security: []
      description: 'Decodes opcodes and message bodies into human-readable form. Opcodes can be in hex (with or without `0x`
        prefix) or decimal format. Bodies should be in base64 or hex format. Maximum 1000 items per list. Use POST for long
        parameter lists that may be truncated in GET requests.'
      tags:
      - Utils
      summary: Decode opcodes and bodies
      operationId: api_v3_post_decode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecodeRequest'
      responses:
        '200':
          description: Decoded opcodes and message bodies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecodeResponse'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
  /api/v3/dns/records:
    get:
      security: []
      description: 'Returns DNS records matching the specified filters. Currently supports `.ton` and `.t.me` domains. Query
        by wallet address (returns records pointing to that wallet) or by exact domain name. Provide one filter, not both.'
      tags:
      - Dns
      summary: Get DNS records
      operationId: api_v3_get_dns_records
      parameters:
      - name: wallet
        in: query
        description: Wallet address in any form. DNS records that contain this address in wallet category will be returned.
        schema:
          type: string
      - name: domain
        in: query
        description: Domain name to search for. DNS records with this exact domain name will be returned.
        schema:
          type: string
      - name: limit
        in: query
        description: 'Limit number of queried rows. Use with *offset* to batch read.'
        schema:
          type: integer
          format: int32
          default: 100
          minimum: 1
          maximum: 1000
      - name: offset
        in: query
        description: 'Skip first N rows. Use with *limit* to batch read.'
        schema:
          type: integer
          format: int32
          default: 0
          minimum: 0
      responses:
        '200':
          description: Matching DNS records with address book.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DNSRecordsResponse'
        '422':
          $ref: '#/components/responses/422'
  /api/v3/estimateFee:
    post:
      security: []
      description: 'Estimates the fees required to process a transaction. Accepts a target address and serialized message
        body, init-code, and init-data (all base64-encoded). Returns a breakdown of source and destination fees including
        storage, gas, and forwarding costs.'
      tags:
      - Api/v2
      summary: Estimate fee
      operationId: api_v3_post_v2_estimate_fee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/V2EstimateFeeRequest'
      responses:
        '200':
          description: Estimated fee breakdown for source and destination accounts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2EstimateFeeResult'
  /api/v3/jetton/burns:
    get:
      security: []
      description: 'Returns Jetton burn events matching the specified filters. Filter by owner address, Jetton wallet address,
        Jetton master address, or time range. Each burn includes the amount, query ID, and transaction reference.'
      tags:
      - Jettons
      summary: Get Jetton burns
      operationId: api_v3_get_jetton_burns
      parameters:
      - name: address
        in: query
        description: Address of jetton wallet owner in any form. Max 1000
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: jetton_wallet
        in: query
        description: 'Jetton wallet address in any form. Max: 1000.'
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: jetton_master
        in: query
        description: Jetton master address in any form.
        schema:
          type: string
      - name: start_utime
        in: query
        description: 'Query transactions with generation UTC timestamp **after** given timestamp.'
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: end_utime
        in: query
        description: 'Query transactions with generation UTC timestamp **before** given timestamp.'
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: start_lt
        in: query
        description: 'Query transactions with `lt >= start_lt`.'
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: end_lt
        in: query
        description: 'Query transactions with `lt <= end_lt`.'
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: limit
        in: query
        description: 'Limit number of queried rows. Use with *offset* to batch read.'
        schema:
          type: integer
          format: int32
          default: 10
          minimum: 1
          maximum: 1000
      - name: offset
        in: query
        description: 'Skip first N rows. Use with *limit* to batch read.'
        schema:
          type: integer
          format: int32
          default: 0
          minimum: 0
      - name: sort
        in: query
        description: Sort transactions by lt.
        schema:
          type: string
          default: desc
          enum:
          - asc
          - desc
      responses:
        '200':
          description: Matching Jetton burn events with address book and metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JettonBurnsResponse'
  /api/v3/jetton/masters:
    get:
      security: []
      description: 'Returns Jetton master contracts matching the specified filters. Filter by master address or admin address.
        Each result includes total supply, mintability status, content metadata, and wallet code hash.'
      tags:
      - Jettons
      summary: Get Jetton masters
      operationId: api_v3_get_jetton_masters
      parameters:
      - name: address
        in: query
        description: 'Jetton Master address in any form. Max: 1024.'
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: admin_address
        in: query
        description: 'Address of Jetton Master''s admin in any form. Max: 1024.'
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: limit
        in: query
        description: 'Limit number of queried rows. Use with *offset* to batch read.'
        schema:
          type: integer
          format: int32
          default: 10
          minimum: 1
          maximum: 1000
      - name: offset
        in: query
        description: 'Skip first N rows. Use with *limit* to batch read.'
        schema:
          type: integer
          format: int32
          default: 0
          minimum: 0
      responses:
        '200':
          description: Matching Jetton master contracts with address book and metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JettonMastersResponse'
  /api/v3/jetton/transfers:
    get:
      security: []
      description: 'Returns Jetton transfer events matching the specified filters. Filter by owner address, Jetton wallet,
        Jetton master, direction, or time range. Each transfer includes source, destination, amount, and optional forward/custom
        payloads.'
      tags:
      - Jettons
      summary: Get Jetton transfers
      operationId: api_v3_get_jetton_transfers
      parameters:
      - name: owner_address
        in: query
        description: Address of jetton wallet owner in any form. Max 1000
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: jetton_wallet
        in: query
        description: 'Jetton wallet address in any form. Max: 1000.'
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: jetton_master
        in: query
        description: Jetton master address in any form.
        schema:
          type: string
      - name: direction
        in: query
        description: 'Direction of transfer. *Note:* applied only with owner_address.'
        schema:
          type: string
          enum:
          - in
          - out
      - name: start_utime
        in: query
        description: 'Query transactions with generation UTC timestamp **after** given timestamp.'
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: end_utime
        in: query
        description: 'Query transactions with generation UTC timestamp **before** given timestamp.'
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: start_lt
        in: query
        description: 'Query transactions with `lt >= start_lt`.'
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: end_lt
        in: query
        description: 'Query transactions with `lt <= end_lt`.'
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: limit
        in: query
        description: 'Limit number of queried rows. Use with *offset* to batch read.'
        schema:
          type: integer
          format: int32
          default: 10
          minimum: 1
          maximum: 1000
      - name: offset
        in: query
        description: 'Skip first N rows. Use with *limit* to batch read.'
        schema:
          type: integer
          format: int32
          default: 0
          minimum: 0
      - name: sort
        in: query
        description: Sort transactions by lt.
        schema:
          type: string
          default: desc
          enum:
          - asc
          - desc
      responses:
        '200':
          description: Matching Jetton transfer events with address book and metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JettonTransfersResponse'
  /api/v3/jetton/wallets:
    get:
      security: []
      description: 'Returns Jetton wallet contracts matching the specified filters. Filter by wallet address, owner address,
        or Jetton master address. Each result includes balance, owner, and associated Jetton master. Use `exclude_zero_balance`
        to skip empty wallets.'
      tags:
      - Jettons
      summary: Get Jetton wallets
      operationId: api_v3_get_jetton_wallets
      parameters:
      - name: address
        in: query
        description: 'Jetton wallet address in any form. Max: 1000.'
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: owner_address
        in: query
        description: 'Address of Jetton wallet''s owner in any form. Max: 1000.'
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: jetton_address
        in: query
        description: Jetton Master in any form.
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: exclude_zero_balance
        in: query
        description: Exclude jetton wallets with 0 balance.
        schema:
          type: boolean
      - name: limit
        in: query
        description: 'Limit number of queried rows. Use with *offset* to batch read.'
        schema:
          type: integer
          format: int32
          default: 10
          minimum: 1
          maximum: 1000
      - name: offset
        in: query
        description: 'Skip first N rows. Use with *limit* to batch read.'
        schema:
          type: integer
          format: int32
          default: 0
          minimum: 0
      - name: sort
        in: query
        description: 'Sort jetton wallets by balance. **Warning:** results may be inconsistent during the read with limit
          and offset.'
        schema:
          type: string
          enum:
          - asc
          - desc
      responses:
        '200':
          description: Matching Jetton wallet contracts with address book and metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JettonWalletsResponse'
        '422':
          $ref: '#/components/responses/422'
  /api/v3/masterchainBlockShardState:
    get:
      security: []
      description: 'Returns the shard state at a given masterchain block sequence number. Equivalent to the v2 `/shards` endpoint.
        Use this to discover which shard blocks were committed in a specific masterchain block.'
      tags:
      - Blockchain Data
      summary: Get masterchain block shard state
      operationId: api_v3_get_masterchainBlockShardState
      parameters:
      - name: seqno
        in: query
        description: Masterchain block seqno.
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Shard configuration at the specified masterchain block.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionsResponse'
        '404':
          $ref: '#/components/responses/404'
  /api/v3/masterchainBlockShards:
    get:
      security: []
      description: Returns all workchain blocks that appeared after the previous masterchain block for a given sequence number.
        Useful for iterating through all shard blocks between masterchain blocks.
      tags:
      - Blockchain Data
      summary: Get masterchain block shards
      operationId: api_v3_get_masterchainBlockShards
      parameters:
      - name: seqno
        in: query
        description: Masterchain block seqno.
        required: true
        schema:
          type: integer
          format: int32
      - name: limit
        in: query
        description: 'Limit number of queried rows. Use with *offset* to batch read.'
        schema:
          type: integer
          format: int32
