name: 💅 Linting suite

env:
  HUSKY: 0
  NODE_VERSION: 20

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-linter
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  format-check:
    name: "Formatting"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          corepack enable
          npm ci

      - name: Get changed MDX and Markdown files
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: |
            **.md
            **.mdx

      - name: Check formatting of MDX and Markdown files
        id: check-fmt
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          set -euo pipefail
          if [ -z $(echo -e "${ALL_CHANGED_FILES[@]}" | tr -d '[:space:]') ]; then
            echo -e '\nNo such files affected!'
            exit 0
          fi
          echo -e '\nChecking formatting of the following MDX and Markdown files affected by this PR:\n'
          for file in ${ALL_CHANGED_FILES}; do
            echo "- $file"
          done
          echo
          FILES="$(echo -e "${ALL_CHANGED_FILES[@]}" | sed 's/.*/\"&\"/' | tr '\n' ' ')"
          ( # try
            npx remark --no-stdout --quiet --frail --silently-ignore $FILES
          ) || ( # catch
            ERR="$(echo $?)"
            # Comment right in the actions output
            echo -e "\nInstall necessary dependencies: \033[31mnpm ci\033[0m"
            echo -e "Then, run this to fix formatting: \033[31mnpx remark -o --silent --silently-ignore ${FILES}\033[0m"
            # Comment on the PR (if there is one)
            if [ ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && 'true' || 'false' }} = "false" ]; then
              exit $ERR # exit code of the failed formatting check
            fi
            API="https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.number }}/comments"
            COMMENT="To fix the **formatting** issues:\n\n1. Install necessary dependencies: \`npm ci\`\n2. Then, run this command:\n\`\`\`shell\nnpx remark -o --silent --silently-ignore ${FILES}\n\`\`\`"
            BY_MAINTAINER=${{ contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.author_association) && 'true' || 'false' }}
            if [ "$BY_MAINTAINER" = "true" ]; then
              COMMENT="${COMMENT}\n\n**Alternatively**, request automatic changes by commenting /fmt in this PR."
            else
              COMMENT="${COMMENT}\n\n**Alternatively**, a maintainer can request automatic changes by commenting /fmt in this PR."
            fi
            curl -sS -o /dev/null -L -X POST "$API" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d "{\"body\":\"${COMMENT}\"}"
            exit $ERR # exit code of the failed formatting check
          )

  spell-check:
    name: "Spelling"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # The fetch-depth is not set to 0 to prevent the cspell-action
        # from misfiring on files that are in main but not on this PR branch

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          corepack enable
          npm ci

      - name: Run CSpell on changed files
        # This action also annotates the PR
        uses: streetsidesoftware/cspell-action@v7
        with:
          check_dot_files: explicit
          suggestions: true
          config: ".cspell.jsonc"

  redirects-check:
    name: "Redirects"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          corepack enable
          npm ci

      - name: Check uniqueness of redirect sources in docs.json
        if: ${{ !cancelled() }}
        run: node scripts/check-redirects.mjs unique

      - name: Check existence of redirect destinations in docs.json
        if: ${{ !cancelled() }}
        run: node scripts/check-redirects.mjs exist

      - name: Check redirects against the previous TON Documentation
        if: ${{ !cancelled() }}
        run: node scripts/check-redirects.mjs previous

      # NOTE: Re-enable before the release,
      #       see: https://github.com/ton-org/docs/issues/39
      # - name: Check redirects against the upstream docs.json structure
      #   if: ${{ !cancelled() }}
      #   run: node scripts/check-redirects.mjs upstream

  navigation-check:
    name: "Navigation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          corepack enable
          npm ci

      - name: Check uniqueness of navigation paths in docs.json
        if: ${{ !cancelled() }}
        run: node scripts/check-navigation.mjs unique

      - name: Check existence of navigation .mdx pages in docs.json
        if: ${{ !cancelled() }}
        run: node scripts/check-navigation.mjs exist

      - name: Check coverage of .mdx pages by docs.json
        if: ${{ !cancelled() }}
        run: node scripts/check-navigation.mjs cover
